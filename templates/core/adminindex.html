{%extends 'partials/abase.html'%}
{% load static %}

{% block content%}
                
                <!-- Sample dashboard content -->
                <br><br> 
<div class="row">
    <div class="col-lg-3 col-md-6">
        <div class="card text-white bg-primary mb-3">
            <div class="card-body">
                <h5 class="card-title">Total Products</h5>
                <p class="card-text">{{ product_count }} products available.</p> <!-- Dynamic product count -->
            </div>
        </div>
    </div>
    <div class="col-lg-3 col-md-6">
        <div class="card text-white bg-success mb-3">
            <div class="card-body">
                <h5 class="card-title">Total Users</h5>
                <p class="card-text">{{ user_count }} registered users.</p> <!-- Dynamic user count -->
            </div>
        </div>
    </div>
    <div class="col-lg-3 col-md-6">
        <div class="card text-white bg-warning mb-3">
            <div class="card-body">
                <h5 class="card-title">Total Orders</h5>
                <p class="card-text">0 orders placed.</p> <!-- Dynamic order count -->
            </div>
        </div>
    </div>
</div>


{%endblock content%}
