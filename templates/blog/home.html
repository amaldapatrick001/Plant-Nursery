<!-- blog/home.html -->
{% extends 'partials/base.html' %}

{% block content %}
<div class="container mt-4">
    <h2>Latest Blog Posts</h2>
    <ul class="list-group">
        {% for post in posts %}
        <li class="list-group-item">
            <a href="{% url 'blog:detail' post.id %}">{{ post.title }}</a> <small class="text-muted">{{ post.created_at }}</small>
        </li>
        {% empty %}
        <li class="list-group-item">No blog posts available.</li>
        {% endfor %}
    </ul>
</div>
{% endblock %}
