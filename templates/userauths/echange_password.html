{% extends 'partials/ebase.html' %}
{% load static %}

{% block content %}
<style>
    body {
        overflow-x: hidden;  /* Prevent horizontal scrolling */
        background: linear-gradient(135deg, #f5f7fa 0%, #e4e9f2 100%);
    }

    .container {
        margin-left: 280px;  /* Match left panel width */
        margin-top: 80px;
        margin-bottom: 50px;
        padding: 20px;
        max-width: calc(100vw - 300px);  /* Account for left panel */
        width: 100%;
        position: relative;
    }

    .row {
        margin: 0;  /* Remove default row margins */
    }

    .card {
        background: rgba(255, 255, 255, 0.98);
        backdrop-filter: blur(20px);
        border: none;
        border-radius: 24px;
        box-shadow: 0 20px 40px rgba(0, 0, 0, 0.08);
        overflow: hidden;
        position: relative;
    }

    .card::before {
        content: '';
        position: absolute;
        top: 0;
        left: 0;
        width: 100%;
        height: 5px;
        background: linear-gradient(90deg, #2E7D32, #388E3C, #4CAF50);
    }

    .card-header {
        background: linear-gradient(135deg, #1b5e20, #2e7d32);
        padding: 2.5rem;
        border: none;
        position: relative;
        overflow: hidden;
    }

    .category-list-heading {
        color: white;
        font-size: 2.2rem;
        margin: 0;
        text-shadow: 2px 2px 4px rgba(0, 0, 0, 0.2);
        display: flex;
        align-items: center;
        gap: 1rem;
        padding: 1rem;
        background: linear-gradient(135deg, #1b5e20, #2e7d32);
        border-radius: 10px;
    }

    .form-group {
        margin-bottom: 1.8rem;
    }

    .form-group label {
        font-weight: 600;
        color: #2E7D32;
        margin-bottom: 0.8rem;
        font-size: 1rem;
    }

    .form-control {
        height: 65px;
        padding: 1.5rem 1rem 0.5rem;
        border: 2px solid rgba(46, 125, 50, 0.15);
        border-radius: 16px;
        font-size: 1.05rem;
        transition: all 0.3s ease;
        background-color: #f8f9fa;
    }

    .form-control:focus {
        border-color: #2E7D32;
        box-shadow: 0 0 0 4px rgba(46, 125, 50, 0.1);
        background-color: #ffffff;
    }

    .btn-primary {
        background: linear-gradient(135deg, #2E7D32, #388E3C);
        color: white;
        border: none;
        border-radius: 12px;
        padding: 1.2rem 2.5rem;
        font-size: 1.1rem;
        font-weight: 600;
        width: 100%;
        margin-top: 2rem;
        transition: all 0.3s ease;
        display: flex;
        align-items: center;
        justify-content: center;
        gap: 0.8rem;
        text-transform: uppercase;
        letter-spacing: 1px;
    }

    .btn-primary:hover {
        transform: translateY(-2px);
        box-shadow: 0 8px 20px rgba(46, 125, 50, 0.3);
    }

    .error {
        color: #dc3545;
        font-size: 0.875rem;
        margin-top: 0.5rem;
        padding: 0.5rem;
        border-radius: 4px;
    }

    .alert {
        border-radius: 10px;
        padding: 1rem;
        margin-top: 1.5rem;
        background: rgba(130, 174, 70, 0.1);
        border: 1px solid rgba(130, 174, 70, 0.2);
    }

    /* Animations */
    @keyframes fadeIn {
        from {
            opacity: 0;
            transform: translateY(20px);
        }
        to {
            opacity: 1;
            transform: translateY(0);
        }
    }

    .fade-in {
        animation: fadeIn 0.6s ease-out;
    }

    /* Media Queries */
    @media (max-width: 992px) {
        .container {
            margin-left: 240px;
            max-width: calc(100vw - 260px);
        }
    }

    @media (max-width: 768px) {
        .container {
            margin-left: 0;
            max-width: 100%;
            padding: 15px;
        }
    }
</style>

<div class="container fade-in">
    <div class="row justify-content-center">
        <div class="col-lg-6 col-md-8">
            <div class="card">
                <div class="card-body">
                    <h2 class="category-list-heading">Change Your Password</h2>
                    <form id="passwordChangeForm" method="post" class="needs-validation" novalidate>
                        {% csrf_token %}

                        <div class="form-group">
                            <label for="id_old_password">Old Password</label>
                            <input type="password" id="id_old_password" name="old_password" 
                                   class="form-control" placeholder="Enter Old Password" required>
                            <span id="oldPasswordError" class="error"></span>
                        </div>

                        <div class="form-group">
                            <label for="id_password1">New Password</label>
                            <input type="password" id="id_password1" name="new_password1" 
                                   class="form-control" placeholder="Enter New Password" required>
                            <span id="password1Error" class="error"></span>
                        </div>

                        <div class="form-group">
                            <label for="id_password2">Confirm Password</label>
                            <input type="password" id="id_password2" name="new_password2" 
                                   class="form-control" placeholder="Confirm New Password" required>
                            <span id="password2Error" class="error"></span>
                        </div>

                        <button type="submit" class="btn btn-primary w-100">Change Password</button>
                    </form>

                    {% if messages %}
                    <ul class="mt-3">
                        {% for message in messages %}
                        <li class="alert alert-info">{{ message }}</li>
                        {% endfor %}
                    </ul>
                    {% endif %}
                </div>
            </div>
        </div>
    </div>
</div>
<script src="{% static 'js/passwordValidation.js' %}"></script>
{% endblock %}

<script>document.addEventListener('DOMContentLoaded', () => {
    const passwordFields = {
        old_password: {
            element: document.getElementById('id_old_password'),
            errorElement: document.getElementById('oldPasswordError'),
            message: 'Old password is required.',
        },
        new_password1: {
            element: document.getElementById('id_password1'),
            errorElement: document.getElementById('password1Error'),
            pattern: /^(?=.*[a-z])(?=.*[A-Z])(?=.*\d)(?=.*[@$!%*?&#])[A-Za-z\d@$!%*?&#]{8,}$/,
            message: 'Password must be at least 8 characters long and include uppercase, lowercase, numbers, and symbols.',
        },
        new_password2: {
            element: document.getElementById('id_password2'),
            errorElement: document.getElementById('password2Error'),
            validateMatch: true,
            message: 'Passwords do not match.',
        },
    };

    const showError = (field, message) => {
        const { element, errorElement } = field;
        if (errorElement) {
            errorElement.textContent = message;
            errorElement.style.display = 'block';
        }
        if (element) {
            element.classList.add('input-invalid');
        }
    };

    const clearError = (field) => {
        const { element, errorElement } = field;
        if (errorElement) {
            errorElement.textContent = '';
            errorElement.style.display = 'none';
        }
        if (element) {
            element.classList.remove('input-invalid');
        }
    };

    const validateField = (field, fields) => {
        const { element, pattern, validateMatch } = field;
        const value = element.value;

        if (validateMatch) {
            const newPassword1 = fields.new_password1.element.value;
            if (value !== newPassword1) {
                return false;
            }
        }

        if (pattern && !pattern.test(value)) {
            return false;
        }

        return true;
    };

    const handleValidation = (fieldKey, fields) => {
        const field = fields[fieldKey];
        if (!validateField(field, fields)) {
            showError(field, field.message);
            return false;
        }
        clearError(field);
        return true;
    };

    const form = document.getElementById('passwordChangeForm');
    form.addEventListener('submit', (event) => {
        let isValid = true;

        Object.keys(passwordFields).forEach((key) => {
            if (!handleValidation(key, passwordFields)) {
                isValid = false;
            }
        });

        if (!isValid) {
            event.preventDefault();
        }
    });

    Object.keys(passwordFields).forEach((key) => {
        const { element } = passwordFields[key];
        element.addEventListener('input', () => clearError(passwordFields[key]));
    });
});

</script>
