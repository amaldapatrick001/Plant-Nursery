{% extends 'partials/base.html' %}
{% load static %}

{% block content %}

<style>
    /* Custom Styles for the Registration Form */
    .form-group {
        margin-bottom: 1rem;
    }

    .form-group input {
        border-radius: 5px;
        padding: 10px 15px;
        border: 1px solid #ced4da;
        width: 100%;
        box-sizing: border-box;
    }

    .form-group input:focus {
        border-color: #007bff;
        box-shadow: 0 0 0 0.2rem rgba(38, 143, 255, 0.25);
    }

    .card {
        border: 1px solid #e0e0e0;
    }

    .card-body {
        border-radius: 15px;
        background-color: #f9f9f9;
    }

    .row {
        margin-right: 0;
        margin-left: 0;
    }

    .col-md-6 {
        padding-right: 1px;
        padding-left: 1px;
    }

    .form-group.row {
        margin-bottom: 1.5rem;
    }

    .btn {
        border-radius: 25px;
        padding: 10px 20px;
    }

    .btn-primary {
        background-color: #007bff;
        border-color: #007bff;
    }

    .btn-primary:hover {
        background-color: #0056b3;
        border-color: #004085;
    }

    .text-danger {
        font-size: 0.875rem;
    }

    .logo {
        display: block;
        margin: 0 auto 20px;
        width: 200px;
    }

    .separator {
        display: flex;
        align-items: center;
        margin: 20px 0;
    }

    .separator::before,
    .separator::after {
        content: '';
        flex: 1;
        height: 1px;
        background-color: #e0e0e0;
    }

    .separator span {
        padding: 0 10px;
        color: #6c757d;
    }
</style>

<section class="ftco-section py-5">
    <div class="container">
        <div class="row justify-content-center">
            <div class="col-md-8 col-lg-6">
                <div class="card shadow-lg border-light rounded">
                    <div class="card-body p-4">
                        <img src="{% static 'images/logo.png' %}" alt="Logo" class="logo">
                        
                        <h4 class="card-title text-center mb-4">Login to Your Account</h4>
                        <form id="loginForm" action="{% url 'userauths:login' %}" method="post">
                            {% csrf_token %}
                            
                            <!-- Email Field -->
                            <div class="form-group">
                                <input type="email" id="id_email" name="email" placeholder="Email id" class="form-control">
                                <div id="emailError" class="text-danger"></div>
                            </div>
                        
                            <!-- Password Field -->
                            <div class="form-group">
                                <input type="password" id="id_password" name="password" placeholder="Password" class="form-control">
                                <div id="passwordError" class="text-danger"></div>
                            </div>
                        
                            <!-- Submit Button -->
                            <button type="submit" id="login" class="btn btn-primary btn-lg btn-block mt-3">Login</button>
                        </form>
                        
                        <div class="separator">
                            <span>or</span>
                        </div>

                       

                        <div class="form-group text-center mt-4">
                            <p class="text-muted">
                                <a href="{% url 'userauths:password_reset' %}" class="text-primary font-weight-bold">Forgot Your Password?</a>
                            </p>
                        </div>                        
                        
                        <div class="form-group text-center mt-4">
                            <p class="text-muted">Don't have an account? <a href="{% url 'userauths:register' %}" class="text-primary font-weight-bold">Register here</a></p>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>
</section>

<script src="https://accounts.google.com/gsi/client" async defer></script>

<!-- Script to manage modal, form validation, and session redirection -->
<script>
    document.addEventListener('DOMContentLoaded', () => {
        // Your form validation and modal logic

        const messagesExist = {% if messages %}true{% else %}false{% endif %};
        const redirectUrl = "{% if request.session.redirect_url %}{% url request.session.redirect_url %}{% endif %}";

        if (messagesExist) {
            $('#messageModal').modal('show');
        }

        document.getElementById('modalCloseButton').addEventListener('click', function() {
            if (redirectUrl) {
                window.location.href = redirectUrl;
            }
        });
    });
</script>

{% endblock %}
