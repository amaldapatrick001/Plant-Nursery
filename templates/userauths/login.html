{% extends 'partials/base.html' %}
{% load static %}

{% block content %}

<style>
    /* Custom Styles for the Registration Form */
    .form-group {
        margin-bottom: 1rem;
    }

    .form-group input {
        border-radius: 5px;
        padding: 10px 15px;
        border: 1px solid #ced4da;
        width: 100%;
        box-sizing: border-box;
    }

    .form-group input:focus {
        border-color: #007bff;
        box-shadow: 0 0 0 0.2rem rgba(38, 143, 255, 0.25);
    }

    .card {
        border: 1px solid #e0e0e0;
    }

    .card-body {
        border-radius: 15px;
        background-color: #f9f9f9;
    }

    .row {
        margin-right: 0;
        margin-left: 0;
    }

    .col-md-6 {
        padding-right: 1px;
        padding-left: 1px;
    }

    .form-group.row {
        margin-bottom: 1.5rem;
    }

    .btn {
        border-radius: 25px;
        padding: 10px 20px;
    }

    .btn-primary {
        background-color: #007bff;
        border-color: #007bff;
    }

    .btn-primary:hover {
        background-color: #0056b3;
        border-color: #004085;
    }

    .text-danger {
        font-size: 0.875rem;
    }

    .logo {
        display: block;
        margin: 0 auto 20px;
        width: 200px;
    }

    .separator {
        display: flex;
        align-items: center;
        margin: 20px 0;
    }

    .separator::before,
    .separator::after {
        content: '';
        flex: 1;
        height: 1px;
        background-color: #e0e0e0;
    }

    .separator span {
        padding: 0 10px;
        color: #6c757d;
    }

    .google-login .btn-light {
        background-color: #ffffff;
        border: 1px solid #dadce0;
        color: #3c4043;
        margin-top: 1rem;
    }

    .google-login .btn-light:hover {
        background-color: #f8f9fa;
        box-shadow: 0 1px 2px 0 rgba(60,64,67,.3), 0 1px 3px 1px rgba(60,64,67,.15);
    }
</style>

<section class="ftco-section py-5">
    <div class="container">
        <div class="row justify-content-center">
            <div class="col-md-8 col-lg-6">
                <div class="card shadow-lg border-light rounded">
                    <div class="card-body p-4">
                        <img src="{% static 'images/logo.png' %}" alt="Logo" class="logo">
                        
                        <h4 class="card-title text-center mb-4">Login to Your Account</h4>
                        <form id="loginForm" action="{% url 'userauths:login' %}" method="post">
                            {% csrf_token %}
                            
                            <!-- Email Field -->
                            <div class="form-group">
                                <input type="email" id="id_email" name="email" placeholder="Email id" class="form-control">
                                <div id="emailError" class="text-danger"></div>
                            </div>
                        
                            <!-- Password Field -->
                            <div class="form-group">
                                <input type="password" id="id_password" name="password" placeholder="Password" class="form-control">
                                <div id="passwordError" class="text-danger"></div>
                            </div>
                        
                            <!-- Submit Button -->
                            <button type="submit" id="login" class="btn btn-primary btn-lg btn-block mt-3">Login</button>
                        </form>
                        
                        <div class="separator">
                            <span>or</span>
                        </div>

                        <div class="google-login">
                            <a href="{% url 'social:begin' 'google-oauth2' %}" class="btn btn-light btn-lg btn-block d-flex align-items-center justify-content-center">
                                <svg version="1.1" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 48 48" class="me-2" style="width: 24px; height: 24px;">
                                    <path fill="#EA4335" d="M24 9.5c3.54 0 6.71 1.22 9.21 3.6l6.85-6.85C35.9 2.38 30.47 0 24 0 14.62 0 6.51 5.38 2.56 13.22l7.98 6.19C12.43 13.72 17.74 9.5 24 9.5z"/>
                                    <path fill="#4285F4" d="M46.98 24.55c0-1.57-.15-3.09-.38-4.55H24v9.02h12.94c-.58 2.96-2.26 5.48-4.78 7.18l7.73 6c4.51-4.18 7.09-10.36 7.09-17.65z"/>
                                    <path fill="#FBBC05" d="M10.53 28.59c-.48-1.45-.76-2.99-.76-4.59s.27-3.14.76-4.59l-7.98-6.19C.92 16.46 0 20.12 0 24c0 3.88.92 7.54 2.56 10.78l7.97-6.19z"/>
                                    <path fill="#34A853" d="M24 48c6.48 0 11.93-2.13 15.89-5.81l-7.73-6c-2.15 1.45-4.92 2.3-8.16 2.3-6.26 0-11.57-4.22-13.47-9.91l-7.98 6.19C6.51 42.62 14.62 48 24 48z"/>
                                    <path fill="none" d="M0 0h48v48H0z"/>
                                </svg>
                                Sign in with Google
                            </a>
                        </div>

                        <div class="form-group text-center mt-4">
                            <p class="text-muted">
                                <a href="{% url 'userauths:password_reset' %}" class="text-primary font-weight-bold">Forgot Your Password?</a>
                            </p>
                        </div>                        
                        
                        <div class="form-group text-center mt-4">
                            <p class="text-muted">Don't have an account? <a href="{% url 'userauths:register' %}" class="text-primary font-weight-bold">Register here</a></p>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>
</section>

<script src="https://accounts.google.com/gsi/client" async defer></script>

<!-- Script to manage modal, form validation, and session redirection -->
<script>
    document.addEventListener('DOMContentLoaded', () => {
        // Your form validation and modal logic

        const messagesExist = {% if messages %}true{% else %}false{% endif %};
        const redirectUrl = "{% if request.session.redirect_url %}{% url request.session.redirect_url %}{% endif %}";

        if (messagesExist) {
            $('#messageModal').modal('show');
        }

        document.getElementById('modalCloseButton').addEventListener('click', function() {
            if (redirectUrl) {
                window.location.href = redirectUrl;
            }
        });
    });
</script>

{% endblock %}
