{% extends 'partials/base.html' %}
{% load static %}
{% block content %}
  <h2>Reset Your Password</h2>
  {% if validlink %}
  <form method="post">
    {% csrf_token %}
    {{ form.as_p }}
    <button type="submit">Change my password</button>
  </form>
  {% else %}
  <p>The password reset link was invalid because it has already been used. Please request a new password reset.</p>
  {% endif %}
{% endblock %}
