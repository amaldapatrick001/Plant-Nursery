{% extends 'partials/base.html' %}
{% load static %}

{% block content %}
    <!-- Bootstrap CSS -->
    <!-- Custom CSS -->
    <style>
        .filter-sidebar {
            background-color: #f8f9fa;
            padding: 20px;
            border-radius: 8px;
        }
        .filter-sidebar h3 {
            margin-bottom: 15px;
            font-size: 1.5rem;
        }
        .filter-sidebar .form-group {
            margin-bottom: 15px;
        }
        .filter-sidebar label {
            font-weight: bold;
        }
        .filter-sidebar input[type="text"] {
            width: 100%;
            padding: .375rem .75rem;
            border-radius: .25rem;
        }
        .filter-sidebar select {
            width: 100%;
            padding: .375rem .75rem;
            border-radius: .25rem;
        }
        .product-card {
        border: 1px solid #e0e0e0;
        border-radius: 8px;
        overflow: hidden;
        margin-bottom: 20px;
        /* Optional: Set a fixed height or adjust to fit content */
        height: auto; 
    }
    .product-card img {
        max-width: 100%;
        height: auto; /* Ensure image maintains aspect ratio */
        object-fit: cover;
    }
    .product-card-body {
        display: flex;
        flex-direction: column;
        justify-content: center; /* Center vertically */
        align-items: center;     /* Center horizontally */
        padding: 20px;
        text-align: center; /* Center text */
    }
    .product-card-body h5 {
        margin-bottom: 10px;
        font-size: 1.25rem; /* Adjust font size if needed */
    }
    .product-card-body p {
        margin-bottom: 10px;
        font-size: 1rem; /* Adjust font size if needed */
    }
    .product-card-body a {
        margin-top: 10px;
    }
    @media (max-width: 767px) {
        .product-card {
            height: auto; /* Adjust height for smaller screens */
        }
        .product-card img {
            height: 200px; /* Adjust image height for smaller screens */
        }
    }
    </style>

    <section class="ftco-section">
        <div class="container">
            <div class="row">
                <div class="col-md-3 mb-5">
                    <div class="filter-sidebar">
                        <h3>Filter Products</h3>
                        <form method="get" action="" class="filter-form">
                            <!-- Filter by Category -->
                            <div class="form-group">
                                <label for="category">Category</label>
                                <select id="category" name="category" class="form-control">
                                    <option value="">Select Category</option>
                                    {% for category in categories %}
                                    <option value="{{ category.id }}" {% if request.GET.category == category.id|stringformat:"s" %}selected{% endif %}>{{ category.name }}</option>
                                    {% endfor %}
                                </select>
                            </div>
                            

                            <!-- Filter by Sunlight Requirement -->
                            <div class="form-group">
                                <label for="sunlight">Sunlight Requirement</label>
                                <select id="sunlight" name="sunlight" class="form-control">
                                    <option value="">Select Sunlight Requirement</option>
                                    <option value="Full Sun" {% if request.GET.sunlight == "Full Sun" %}selected{% endif %}>Full Sun</option>
                                    <option value="Partial Shade" {% if request.GET.sunlight == "Partial Shade" %}selected{% endif %}>Partial Shade</option>
                                    <option value="Full Shade" {% if request.GET.sunlight == "Full Shade" %}selected{% endif %}>Full Shade</option>
                                </select>
                            </div>

                            <!-- Filter by Water Need -->
                            <div class="form-group">
                                <label for="water">Water Need</label>
                                <select id="water" name="water" class="form-control">
                                    <option value="">Select Water Need</option>
                                    <option value="Low" {% if request.GET.water == "Low" %}selected{% endif %}>Low</option>
                                    <option value="Medium" {% if request.GET.water == "Medium" %}selected{% endif %}>Medium</option>
                                    <option value="High" {% if request.GET.water == "High" %}selected{% endif %}>High</option>
                                </select>
                            </div>

                            <!-- Filter by Climate Compatibility -->
                            <div class="form-group">
                                <label for="climate">Climate Compatibility</label>
                                <select id="climate" name="climate" class="form-control">
                                    <option value="">Select Climate Compatibility</option>
                                    <option value="Tropical" {% if request.GET.climate == "Tropical" %}selected{% endif %}>Tropical</option>
                                    <option value="Subtropical" {% if request.GET.climate == "Subtropical" %}selected{% endif %}>Subtropical</option>
                                    <option value="Temperate" {% if request.GET.climate == "Temperate" %}selected{% endif %}>Temperate</option>
                                    <option value="Arid" {% if request.GET.climate == "Arid" %}selected{% endif %}>Arid</option>
                                </select>
                            </div>

                            <!-- Filter by Price Range -->
                            <div class="form-group">
                                <label for="price">Price Range</label>
                                <input type="text" id="price" name="price" class="form-control" value="{% if request.GET.price %}{{ request.GET.price }}{% endif %}" placeholder="Enter price range">
                            </div>

                            <!-- JavaScript to automatically submit the form on change -->
                            <script>
                                document.querySelectorAll('.filter-form select, .filter-form input').forEach(element => {
                                    element.addEventListener('change', function() {
                                        this.form.submit();
                                    });
                                });
                            </script>
                        </form>
                    </div>
                </div>
                <div class="col-md-9">
                    <div class="row">
                        {% for product in products %}
                        <div class="col-md-4 mb-4"> <!-- Changed from col-md-3 to col-md-4 -->
                            <div class="product-card">
                                <img src="{{ product.image.url }}" alt="{{ product.name }}">
                                <div class="product-card-body">
                                    <h5>{{ product.product_name }}</h5>
                                    <p>Price: Rs. {{ product.price }}</p>
                                    <a href="" class="btn btn-primary">Add to Cart </a>
                                    <a href="">View details</a>
                                </div>
                            </div>
                        </div>
                        {% empty %}
                        <p>No products available.</p>
                        {% endfor %}
                    </div>
                </div>
                
                
            </div>
        </div>
    </section>

    <!-- Bootstrap JS and dependencies -->
    <script src="https://code.jquery.com/jquery-3.5.1.slim.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@popperjs/core@2.9.2/dist/umd/popper.min.js"></script>
    <script src="https://maxcdn.bootstrapcdn.com/bootstrap/4.5.2/js/bootstrap.min.js"></script>
{% endblock %}
